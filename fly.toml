app = "plt-dashboard"
primary_region = "dfw"

[build]

[env]
  PORT = "8080"
  PLT_DB_PATH = "/data/territory.db"
  PLT_DATA_DIR = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[mounts]
  source = "plt_data"
  destination = "/data"
