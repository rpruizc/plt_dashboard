<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Pending</title>
    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f5f7fb;
            color: #1f2937;
        }
        .wrap {
            min-height: calc(100vh - 68px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .card {
            max-width: 540px;
            background: #fff;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }
        h1 { margin-top: 0; margin-bottom: 8px; }
        p { margin: 0 0 10px; color: #4b5563; line-height: 1.45; }
        a {
            color: #2563eb;
            text-decoration: none;
            font-weight: 600;
        }
        .app-footer {
            border-top: 1px solid #e5e7eb;
            background: #fff;
            color: #6b7280;
            text-align: center;
            font-size: 12px;
            padding: 12px 16px;
        }
        .app-footer-line { margin: 2px 0; }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="card">
            <h1>Access Pending Approval</h1>
            <p>Your account <strong>{{ email }}</strong> is registered and waiting for admin approval.</p>
            <p>Ask an admin to approve you on the user management page.</p>
            <p><a href="/logout">Sign out</a></p>
        </div>
    </div>
    {% include "_footer.html" %}
</body>
</html>
