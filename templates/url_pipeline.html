<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Pipeline — PLT Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header class="header">
        <div class="header-left">
            {% include "_brand_logo.html" %}
            <span class="subtitle">URL Discovery Pipeline</span>
        </div>
        <div class="header-right">
            <a class="btn btn-sm" href="/">Back to Dashboard</a>
            <div class="header-user">
                <span class="header-user-email">{{ current_user.email }}</span>
                <a class="btn btn-sm" href="/logout">Logout</a>
            </div>
            <button class="btn btn-icon" id="theme-toggle" title="Toggle theme">
                <svg id="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                <svg id="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
            </button>
        </div>
    </header>

    <main class="pipeline-page">
        <section class="pipeline-actions">
            <button class="btn btn-primary" id="run-discovery">Run URL Discovery Pass</button>
            <label class="pipeline-inline-label">
                Model
                <input class="detail-input pipeline-model-input" id="discovery-model" value="gpt-5-nano">
            </label>
            <label class="pipeline-inline-label">
                Max companies (0 = all)
                <input class="detail-input pipeline-threshold-input" id="discovery-limit" type="number" min="0" max="5000" value="0">
            </label>
            <label class="pipeline-inline-label">
                Brave results per company
                <input class="detail-input pipeline-threshold-input" id="discovery-top-results" type="number" min="1" max="3" value="3">
            </label>
            <label class="pipeline-inline-label">Auto-accept confidence ≥
                <input class="detail-input pipeline-threshold-input" id="auto-threshold" type="number" min="0" max="100" value="80">
            </label>
            <button class="btn" id="auto-accept">Auto Accept</button>
            <button class="btn" id="refresh-queue">Refresh</button>
        </section>

        <section class="pipeline-actions">
            <label class="pipeline-inline-label">Validation model
                <input class="detail-input pipeline-model-input" id="validation-model" value="gpt-5-nano">
            </label>
            <label class="pipeline-inline-label">Max companies
                <input class="detail-input pipeline-threshold-input" id="validation-limit" type="number" min="1" max="2000" value="120">
            </label>
            <button class="btn btn-primary" id="start-validation">Start Playwright + LLM Validation</button>
            <button class="btn" id="cancel-validation">Cancel Job</button>
            <span class="pipeline-job-status" id="pipeline-job-status">No active validation job</span>
        </section>

        <section class="pipeline-validation-panel" id="pipeline-validation-panel"></section>

        <section class="pipeline-summary" id="pipeline-summary"></section>

        <section class="pipeline-filters">
            <input class="filter-input" id="pipeline-search" placeholder="Search company or URL...">
            <select class="filter-select" id="pipeline-status">
                <option value="all">All statuses</option>
                <option value="pending_review">Pending review</option>
                <option value="accepted">Accepted URL</option>
                <option value="no_url">No URL found</option>
                <option value="not_started">Not started</option>
                <option value="with_url">Has URL</option>
                <option value="without_url">Without URL</option>
            </select>
            <span class="pipeline-results" id="pipeline-results"></span>
        </section>

        <section class="table-wrapper">
            <table class="account-table pipeline-table">
                <thead>
                    <tr>
                        <th>Company</th>
                        <th>Stage</th>
                        <th>Accepted URL</th>
                        <th>Candidate URL</th>
                        <th>Confidence</th>
                        <th>Candidate Meta</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="pipeline-tbody"></tbody>
            </table>
        </section>

        <div class="crm-feedback" id="pipeline-feedback" hidden></div>
    </main>

    {% include "_footer.html" %}

    <script src="/static/url_pipeline.js"></script>
</body>
</html>
